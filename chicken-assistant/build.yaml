# Supervisor addon builder picks BUILD_FROM per architecture. We track the
# core image tag here; scripts/build-addon.sh rewrites it during release.
build_from:
  amd64: ghcr.io/chickenassistant/core:latest
  aarch64: ghcr.io/chickenassistant/core:latest

labels:
  org.opencontainers.image.title: Chicken Assistant
  org.opencontainers.image.source: https://github.com/chickenassistant/core
  org.opencontainers.image.licenses: MIT
